        // State variables
        let currentSearchTerm = '';
        let activeLetters = new Set();
        
        function initializeGlossary() {
            updateActiveLetters();
            renderAlphabetNav();
            renderGlossary();
            updateStats();
            
            // Add event listeners
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('searchInput').addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    clearSearch();
                }
            });
        }

        function updateActiveLetters() {
            activeLetters.clear();
            Object.keys(glossaryData).forEach(term => {
                const firstLetter = term.charAt(0).toUpperCase();
                if (firstLetter.match(/[A-Z]/)) {
                    activeLetters.add(firstLetter);
                }
            });
        }

        function renderAlphabetNav() {
            const letterButtons = document.getElementById('letterButtons');
            letterButtons.innerHTML = '';
            
            // Create buttons only for letters that have terms
            const sortedLetters = Array.from(activeLetters).sort();
            
            sortedLetters.forEach(letter => {
                const button = document.createElement('a');
                button.style.cssText = 'padding: 0.5rem 0.75rem; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block;';
                button.textContent = letter;
                button.href = `#letter-${letter}`;
                button.setAttribute('aria-label', `Jump to terms starting with ${letter}`);
                
                button.onmouseover = function() {
                    this.style.backgroundColor = '#2980b9';
                };
                
                button.onmouseout = function() {
                    this.style.backgroundColor = '#3498db';
                };
                
                button.onclick = (e) => {
                    e.preventDefault();
                    scrollToLetter(letter);
                    updateActiveButton(letter);
                };
                
                letterButtons.appendChild(button);
            });
        }

        function updateActiveButton(activeLetter) {
            // Update button styles to show active state
            document.querySelectorAll('#letterButtons a').forEach(btn => {
                if (btn.textContent === activeLetter) {
                    btn.style.backgroundColor = '#e74c3c';
                } else {
                    btn.style.backgroundColor = '#3498db';
                }
            });
        }

        function renderGlossary(searchTerm = '') {
            const container = document.getElementById('glossaryContainer');
            container.innerHTML = '';
            
            // Group terms by first letter
            const groupedTerms = {};
            let visibleCount = 0;
            
            Object.entries(glossaryData).forEach(([term, definition]) => {
                const termLower = term.toLowerCase();
                const searchLower = searchTerm.toLowerCase();
                
                if (searchTerm === '' || 
                    termLower.includes(searchLower) || 
                    definition.toLowerCase().includes(searchLower)) {
                    
                    const firstLetter = term.charAt(0).toUpperCase();
                    if (!groupedTerms[firstLetter]) {
                        groupedTerms[firstLetter] = [];
                    }
                    groupedTerms[firstLetter].push({ term, definition });
                    visibleCount++;
                }
            });
            
            // Update navigation visibility based on search results
            if (searchTerm) {
                updateSearchNav(Object.keys(groupedTerms));
            } else {
                restoreFullNav();
            }
            
            // Render grouped terms
            if (visibleCount === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: #666; font-size: 1.2rem;">
                        <p>No terms found matching "${searchTerm}"</p>
                        <p>Try a different search term</p>
                    </div>
                `;
            } else {
                Object.keys(groupedTerms).sort().forEach(letter => {
                    const section = document.createElement('section');
                    section.style.cssText = 'margin-bottom: 2rem; scroll-margin-top: 20px;';
                    section.id = `letter-${letter}`;
                    
                    const header = document.createElement('h2');
                    header.style.cssText = 'font-size: 1.5rem; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 0.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;';
                    header.innerHTML = `
                        <span>${letter}</span>
                        <a href="#top" style="font-size: 0.9rem; color: #3498db; text-decoration: none; padding: 0.25rem 0.5rem; border-radius: 4px;" aria-label="Back to top">↑ Top</a>
                    `;
                    section.appendChild(header);
                    
                    groupedTerms[letter].forEach(({ term, definition }) => {
                        const entry = document.createElement('article');
                        entry.style.cssText = 'margin-bottom: 1.5rem; padding: 1rem; background-color: #f8f9fa; border-radius: 6px; border-left: 4px solid #3498db;';
                        
                        const termElement = document.createElement('h3');
                        termElement.style.cssText = 'font-weight: bold; color: #2c3e50; font-size: 1.1rem; margin: 0 0 0.5rem 0;';
                        termElement.innerHTML = highlightText(term, searchTerm);
                        
                        const definitionElement = document.createElement('p');
                        definitionElement.style.cssText = 'color: #333333; line-height: 1.8; margin: 0;';
                        definitionElement.innerHTML = highlightText(definition, searchTerm);
                        
                        entry.appendChild(termElement);
                        entry.appendChild(definitionElement);
                        
                        // Add hover effect
                        entry.onmouseover = function() {
                            this.style.transform = 'translateX(5px)';
                            this.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
                        };
                        
                        entry.onmouseout = function() {
                            this.style.transform = 'translateX(0)';
                            this.style.boxShadow = 'none';
                        };
                        
                        section.appendChild(entry);
                    });
                    
                    container.appendChild(section);
                });
            }
            
            // Update result count
            updateResultCount(visibleCount, searchTerm);
        }

        function updateSearchNav(visibleLetters) {
            document.querySelectorAll('#letterButtons a').forEach(btn => {
                const letter = btn.textContent;
                if (visibleLetters.includes(letter)) {
                    btn.style.display = 'inline-block';
                } else {
                    btn.style.display = 'none';
                }
            });
        }

        function restoreFullNav() {
            document.querySelectorAll('#letterButtons a').forEach(btn => {
                btn.style.display = 'inline-block';
            });
        }

        function highlightText(text, searchTerm) {
            if (!searchTerm) return text;
            
            const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
            return text.replace(regex, '<mark style="background-color: #ffeb3b; padding: 0 2px; border-radius: 2px;">$1</mark>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function handleSearch(event) {
            currentSearchTerm = event.target.value;
            renderGlossary(currentSearchTerm);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentSearchTerm = '';
            renderGlossary();
            document.getElementById('searchInput').focus();
        }

        function scrollToLetter(letter) {
            const element = document.getElementById(`letter-${letter}`);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                // Add highlight effect
                const entries = element.querySelectorAll('article');
                entries.forEach(entry => {
                    entry.style.backgroundColor = '#fff3cd';
                    setTimeout(() => {
                        entry.style.backgroundColor = '#f8f9fa';
                    }, 2000);
                });
            }
        }

        function updateResultCount(count, searchTerm) {
            const resultCount = document.getElementById('resultCount');
            if (searchTerm) {
                resultCount.textContent = `${count} term${count !== 1 ? 's' : ''} found`;
            } else {
                resultCount.textContent = '';
            }
        }

        function updateStats() {
            const totalTerms = document.getElementById('totalTerms');
            const count = Object.keys(glossaryData).length;
            totalTerms.textContent = `Total Terms: ${count}`;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeGlossary);

        // Add keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && e.ctrlKey) {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</p>
